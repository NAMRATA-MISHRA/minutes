# Optional: connect this repo as a Blueprint on Render, or mirror these settings on a manual Web Service.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: minutes-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: UPLOAD_DIR
        value: uploads
      - key: DATABASE_PATH
        value: meetings.db
